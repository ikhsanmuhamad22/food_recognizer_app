name: food_recognition_app
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  build_runner: ^2.13.1
  camera: ^0.12.0+1
  envied: ^1.3.4
  firebase_core: ^4.6.0
  firebase_ml_model_downloader: ^0.4.1
  flutter:
    sdk: flutter

  image: ^4.8.0
  image_cropper: ^12.1.1
  image_picker: ^1.2.1
  provider: ^6.1.2
  tflite_flutter: ^0.12.1
  google_generative_ai: ^0.4.7
  mime: ^2.0.0
  http: ^1.6.0

dev_dependencies:
  envied_generator: ^1.3.4
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/ml_model/probability-labels-en.txt

fonts:
  - family: Manrope
    fonts:
      - asset: assets/fonts/Manrope/Manrope-Bold.ttf
        weight: 700
      - asset: assets/fonts/Manrope/Manrope-SemiBold.ttf
        weight: 600
      - asset: assets/fonts/Manrope/Manrope-Medium.ttf
        weight: 500
      - asset: assets/fonts/Manrope/Manrope-Regular.ttf
        weight: 400
      - asset: assets/fonts/Manrope/Manrope-Light.ttf
        weight: 300
      - asset: assets/fonts/Manrope/Manrope-ExtraLight.ttf
        weight: 200
